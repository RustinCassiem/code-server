name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: advanced-code-server

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          echo "## First Release" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "🎉 Initial release of Advanced Code Server!" >> CHANGELOG.md
        else
          echo "## Changes since $PREVIOUS_TAG" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          # Get commit messages since last tag
          git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD >> CHANGELOG.md
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

    - name: Build release assets
      run: |
        # Create release directory
        mkdir -p release
        
        # Copy important files
        cp README.md release/
        cp docker/docker-compose.yml release/
        cp .env.example release/
        
        # Create deployment manifests
        mkdir -p release/kubernetes
        cp -r k8s/* release/kubernetes/ 2>/dev/null || echo "No k8s directory found"
        
        # Create archive
        tar -czf release/advanced-code-server-${{ steps.version.outputs.version_number }}.tar.gz \
          -C release \
          README.md docker-compose.yml .env.example kubernetes/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Advanced Code Server ${{ steps.version.outputs.version }}
        body: |
          # 🚀 Advanced Code Server ${{ steps.version.outputs.version }}
          
          A feature-rich, secure, and scalable code server platform with VS Code integration.
          
          ## 📋 What's Included
          
          - **Multi-platform Docker images** (AMD64, ARM64)
          - **Complete deployment manifests** (Docker Compose, Kubernetes)
          - **Security scanning** and vulnerability reports
          - **Comprehensive documentation**
          
          ## 🐳 Docker Images
          
          ```bash
          # Pull the latest image
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          ```
          
          ## 🚀 Quick Start
          
          ### Docker Compose
          ```bash
          # Download and extract
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/advanced-code-server-${{ steps.version.outputs.version_number }}.tar.gz
          tar -xzf advanced-code-server-${{ steps.version.outputs.version_number }}.tar.gz
          
          # Configure environment
          cp .env.example .env
          # Edit .env with your settings
          
          # Start services
          docker-compose up -d
          ```
          
          ### Kubernetes
          ```bash
          # Apply manifests
          kubectl apply -f kubernetes/
          ```
          
          ## 📊 Image Information
          
          - **Registry:** `${{ env.REGISTRY }}`
          - **Repository:** `${{ github.repository_owner }}/${{ env.IMAGE_NAME }}`
          - **Tags:** `${{ steps.version.outputs.version }}`, `latest`
          - **Platforms:** `linux/amd64`, `linux/arm64`
          
          ## 🔒 Security
          
          This release has been automatically scanned for:
          - Container vulnerabilities (Trivy, Grype)
          - Dependency vulnerabilities (npm audit, Snyk)
          - Code security issues (CodeQL)
          - Secret detection (TruffleHog)
          
          ## 📝 Changelog
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## 🆘 Support
          
          - 📖 **Documentation:** [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
          - 🐛 **Issues:** [GitHub Issues](https://github.com/${{ github.repository }}/issues)
          - 💬 **Discussions:** [GitHub Discussions](https://github.com/${{ github.repository }}/discussions)
          
          ---
          
          **Full Changelog:** https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ steps.version.outputs.version }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        files: |
          release/advanced-code-server-${{ steps.version.outputs.version_number }}.tar.gz
        generate_release_notes: true

  notify-deployment:
    runs-on: ubuntu-latest
    needs: create-release
    if: always()
    
    steps:
    - name: Notify deployment channels
      run: |
        echo "🎉 Release ${{ github.ref_name }} has been created!"
        echo "Docker images are now available:"
        echo "- ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
        echo "- ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
        
        # Here you could add notifications to Slack, Discord, etc.
        # Example:
        # curl -X POST -H 'Content-type: application/json' \
        #   --data '{"text":"🚀 Advanced Code Server '${{ github.ref_name }}' released!"}' \
        #   ${{ secrets.SLACK_WEBHOOK_URL }}
