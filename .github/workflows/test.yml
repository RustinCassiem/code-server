name: Test Package Scripts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check if package.json exists
      run: |
        if [ -f "package.json" ]; then
          echo "package.json found"
          cat package.json
        else
          echo "package.json not found"
          exit 1
        fi

    - name: Install dependencies
      run: |
        if [ -f "package-lock.json" ]; then
          npm ci
        else
          npm install
        fi

    - name: List available scripts
      run: npm run

    - name: Try to build
      run: |
        if npm run build; then
          echo "Build successful"
        else
          echo "Build failed, but continuing..."
        fi
      continue-on-error: true

    - name: Check TypeScript files
      run: |
        echo "TypeScript files in src:"
        find src -name "*.ts" -type f | head -10 || echo "No TypeScript files found"
