# Dependabot configuration for automated dependency updates

version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "dependabot"
    assignees:
      - "dependabot"
    commit-message:
      prefix: "npm"
      prefix-development: "npm-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      # Ignore major version updates for these packages (breaking changes)
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Group TypeScript-related updates
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "ts-*"
      # Group ESLint-related updates
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      # Group testing-related updates
      testing:
        patterns:
          - "jest"
          - "@jest/*"
          - "supertest"
          - "@types/jest"
      # Group Docker-related updates
      docker:
        patterns:
          - "docker*"
          - "dockerfile*"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "dependabot"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "dependabot"
    commit-message:
      prefix: "actions"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      # Group security-related actions
      security-actions:
        patterns:
          - "*security*"
          - "*scan*"
          - "*audit*"
          - "github/codeql-action"
          - "aquasecurity/*"
          - "snyk/*"
      # Group deployment-related actions
      deployment-actions:
        patterns:
          - "*deploy*"
          - "*docker*"
          - "*kubernetes*"
          - "azure/*"
